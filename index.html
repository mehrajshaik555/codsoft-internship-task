<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Creative Project Manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <button id="themeBtn">Change Background</button>

        <h1>🌙 Creative Project Manager</h1>

        <!-- FIXED IMAGE PATH -->
        <img src="/images/banner.jpg" class="banner" alt="banner">

        <div class="card">
            <h2>Website Design</h2>
            <p>Create modern responsive UI with attractive layout.</p>
        </div>

        <div class="card">
            <h2>Backend API</h2>
            <p>Simple Node.js server for internship project.</p>
        </div>

        <form id="projectForm">
            <input type="text" placeholder="Project Name" required>
            <textarea placeholder="Project Description" required></textarea>
            <button type="submit">Add Project</button>
        </form>

        <div id="projectList"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
